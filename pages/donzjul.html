<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nukaCoffee | 돈쭐장부</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/appinfo.css">
</head>
<body class="bg-white text-zinc-900 selection:bg-zinc-900 selection:text-white overflow-x-hidden">

    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 bg-white/80 backdrop-blur-md border-b border-zinc-100 px-4 md:px-6 py-3 md:py-4 flex justify-between items-center">
        <a href="../portfolio.html" class="flex items-center gap-2 text-xs md:text-sm font-semibold hover:opacity-60 transition-opacity">
            <i class="fa-solid fa-chevron-left text-[10px] md:text-xs"></i>
            Back
        </a>
        <div id="nav-actions" class="flex items-center gap-4"></div>
    </nav>

    <!-- Header Section -->
    <header class="pt-24 md:pt-40 pb-12 md:pb-20 px-6 md:px-12 max-w-5xl mx-auto">
        <div id="header-content" class="space-y-4 text-center md:text-left"></div>
    </header>

    <!-- Marquee Section -->
    <section class="py-12 md:py-20 bg-zinc-50 overflow-hidden">
        <div class="mb-8 md:mb-12 text-center">
            <div class="flex items-center justify-center gap-3 text-zinc-400">
                <div class="h-[1px] w-6 md:w-8 bg-zinc-300"></div>
                <span class="text-[10px] md:text-xs uppercase font-bold tracking-widest">App Interface</span>
                <div class="h-[1px] w-6 md:w-8 bg-zinc-300"></div>
            </div>
        </div>
        <div class="marquee-viewport">
            <div class="marquee-content" id="marquee-content"></div>
        </div>
    </section>

    <!-- Features Container (Zigzag Logic Included) -->
    <div id="features-container" class="w-full"></div>

    <!-- Main Content & Tags -->
    <main class="px-6 md:px-12 max-w-5xl mx-auto py-16 md:py-24 border-t border-zinc-100">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 lg:gap-16">
            <div class="lg:col-span-2">
                <div id="long-description" class="prose prose-zinc prose-sm md:prose-base lg:prose-xl max-w-none"></div>
            </div>
            <div class="space-y-8">
                <div class="bg-zinc-50 p-6 rounded-2xl md:bg-transparent md:p-0">
                    <h4 class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-zinc-400 mb-4">Tags</h4>
                    <div id="tech-tags" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-zinc-100 px-6 md:px-12 py-12 text-center">
        <p class="text-[10px] md:text-[11px] text-zinc-400 uppercase tracking-[0.2em] font-medium">
            © 2026 nukacoffee. <br class="sm:hidden"> All Rights Reserved.
        </p>
    </footer>

    <script>
        const projectData = {
            category: "Lifestyle App",
            title: "돈쭐장부",
            shortDesc: "빌려준 돈을 잊지 않도록, 누구에게 얼마를 빌려줬는지 한눈에 확인하세요.",
            playStoreUrl: "https://play.google.com/store/apps/details?id=com.nukacoffee.moneynote",
            screenshots: [
                "../assets/screenshot/donzjul/0.jpg",
                "../assets/screenshot/donzjul/1.png",
                "../assets/screenshot/donzjul/2.png",
                "../assets/screenshot/donzjul/3.png",
                "../assets/screenshot/donzjul/4.png"
            ],
            features: [
                {
                    tag: "Feature 01",
                    title: "주요 기능",
                    desc: "- 채무자별 거래 내역 및 잔액 관리<br>- 이자 계산 기능 (월 이율 설정)<br>- 독촉 메시지 전송 (카카오톡, 문자 등)<br>- PIN 잠금으로 개인정보 보호<br>- 다크 모드 지원<br>- JSON / CSV 백업 및 복원",
                    image: "../assets/screenshot/donzjul/5.png"
                },
                {
                    tag: "Feature 02",
                    title: "모든 기기에서 끊김 없는 동기화.",
                    desc: "당신의 소중한 브루잉 데이터는 클라우드를 통해 실시간으로 보호됩니다. 스마트폰에서 기록한 데이터를 태블릿이나 웹에서도 즉시 확인하고, 나만의 완벽한 레시피를 영구적으로 보관하세요.",
                    image: "../assets/screenshot/donzjul/5.png"
                }
            ],
            fullDescription: `
                <h2 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8">이런 분들께 추천해요</h2>
                <p class="text-zinc-600 leading-relaxed mb-6 text-base md:text-lg">
                    - 친구나 가족에게 돈을 자주 빌려주는 분<br>- 모임 총무로 돈 관리가 필요한 분<br>- 소액 채무를 깔끔하게 정리하고 싶은 분
                </p>
            `,
            tags: ["Android Native", "Jetpack Compose", "Firebase", "Coffee Brewing", "Home Barista"]
        };

        function initProject() {
            // 네비게이션 & 헤더
            document.getElementById('nav-actions').innerHTML = `<a href="${projectData.playStoreUrl}" class="flex items-center gap-2 px-4 py-2 bg-zinc-900 text-white rounded-full hover:bg-zinc-700 transition-all text-xs font-medium"><i class="fa-brands fa-google-play"></i><span>Play Store</span></a>`;
            document.getElementById('header-content').innerHTML = `<span class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-zinc-400 block">${projectData.category}</span><h1 class="text-4xl md:text-7xl font-bold tracking-tight text-zinc-900">${projectData.title}</h1><p class="text-base md:text-xl text-zinc-500 max-w-2xl leading-relaxed pt-2 md:pt-4">${projectData.shortDesc}</p>`;

            // 마키 이미지
            const marquee = document.getElementById('marquee-content');
            const items = projectData.screenshots.map(src => `<div class="screenshot-item"><div class="aspect-[9/16] bg-zinc-200 rounded-[1.5rem] md:rounded-[2rem] overflow-hidden shadow-lg border border-zinc-100"><img src="${src}" class="w-full h-full object-cover"></div></div>`).join('');
            marquee.innerHTML = items + items;

            // 기능 블록 (지그재그 자동 적용 로직)
            const featuresContainer = document.getElementById('features-container');
            featuresContainer.innerHTML = projectData.features.map((f, index) => {
                // index가 홀수일 때만 텍스트가 왼쪽, 이미지가 오른쪽으로 오도록 order 클래스 부여
                const isEven = index % 2 === 0;
                const imageOrder = isEven ? 'md:order-1' : 'md:order-2';
                const textOrder = isEven ? 'md:order-2' : 'md:order-1';

                return `
                    <section class="px-6 md:px-12 max-w-5xl mx-auto py-16 md:py-24 border-b border-zinc-100">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-20 items-center">
                            <!-- Image Block -->
                            <div class="w-full ${imageOrder}">
                                <div class="aspect-square bg-zinc-100 rounded-2xl md:rounded-3xl overflow-hidden shadow-sm">
                                    <img src="${f.image}" alt="${f.tag}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-700">
                                </div>
                            </div>
                            <!-- Text Block -->
                            <div class="space-y-4 md:space-y-6 ${textOrder}">
                                <div class="flex items-center gap-3 text-zinc-400">
                                    <div class="h-[1px] w-6 md:w-8 bg-zinc-300"></div>
                                    <span class="text-[10px] md:text-xs uppercase font-bold tracking-widest">${f.tag}</span>
                                </div>
                                <h3 class="text-2xl md:text-4xl font-bold text-zinc-900 leading-tight">${f.title}</h3>
                                <p class="text-zinc-500 leading-relaxed text-sm md:text-lg">${f.desc}</p>
                            </div>
                        </div>
                    </section>
                `;
            }).join('');

            // 설명 및 태그
            document.getElementById('long-description').innerHTML = projectData.fullDescription;
            document.getElementById('tech-tags').innerHTML = projectData.tags.map(tag => `<span class="px-3 md:px-4 py-1 md:py-1.5 bg-zinc-100 rounded-full text-[10px] md:text-xs font-semibold text-zinc-500 uppercase tracking-tighter">${tag}</span>`).join('');
        }

        let lastScrollY = window.scrollY;
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.style.transform = (window.scrollY > lastScrollY && window.scrollY > 80) ? 'translateY(-100%)' : 'translateY(0)';
            lastScrollY = window.scrollY;
        });

        window.addEventListener('load', () => {
            initProject();

            // 모바일 터치: 탭마다 재생/일시정지 토글
            const marquee = document.getElementById('marquee-content');
            let isPaused = false;
            marquee.addEventListener('touchstart', () => {
                isPaused = !isPaused;
                marquee.style.animationPlayState = isPaused ? 'paused' : 'running';
            }, { passive: true });
        });
    </script>
</body>
</html>
